services:
  openclaw-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-with-file-manager
    ports:
      - "8080:8080"
      - "8081:8081"
      - "3399:3399"
      - "18789:18789"
      - "6080:6080"
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      C9SDK_PASSWORD: ${C9SDK_PASSWORD:-changeme}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_AUTO_APPROVE_INTERVAL: ${OPENCLAW_AUTO_APPROVE_INTERVAL:-10}
      OPENCLAW_HEALTH_URL: ${OPENCLAW_HEALTH_URL:-http://127.0.0.1:18789/healthz}
      OPENCLAW_ALLOWED_ORIGIN: ${OPENCLAW_ALLOWED_ORIGIN:-}
      INITIAL_OPENCLAW_VERSION: ${INITIAL_OPENCLAW_VERSION:-latest}
      VNC_PASSWORD: ${VNC_PASSWORD:-}
      CUSTOM_PROVIDER_NAME: ${CUSTOM_PROVIDER_NAME:-}
      CUSTOM_PROVIDER_API_KEY: ${CUSTOM_PROVIDER_API_KEY:-}
      CUSTOM_PROVIDER_BASE_URL: ${CUSTOM_PROVIDER_BASE_URL:-}
      CUSTOM_PROVIDER_MODEL_ID: ${CUSTOM_PROVIDER_MODEL_ID:-}
      CUSTOM_PROVIDER_AUTH: ${CUSTOM_PROVIDER_AUTH:-}
      CUSTOM_PROVIDER_API: ${CUSTOM_PROVIDER_API:-}
      CUSTOM_PROVIDER_MODEL_NAME: ${CUSTOM_PROVIDER_MODEL_NAME:-}
      CUSTOM_PROVIDER_MODEL_API: ${CUSTOM_PROVIDER_MODEL_API:-}
    volumes:
      - openclaw_data:/root/.openclaw
      - cursor_config:/root/.config/Cursor
    restart: unless-stopped

volumes:
  openclaw_data:
  cursor_config:
